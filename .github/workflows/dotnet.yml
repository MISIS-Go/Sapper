name: Build and Release
on:
  push:
    branches: ["main"]
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - rid: win-x64
            executable: Sapper.exe
          - rid: linux-x64
            executable: Sapper
          - rid: osx-x64
            executable: Sapper

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish Single File
        run: |
          dotnet publish -c Release -r ${{ matrix.rid }} \
            -p:PublishSingleFile=true \
            -p:SelfContained=true \
            --output ./publish/${{ matrix.rid }}

      - name: Tar files (Linux/macOS)
        if: matrix.rid != 'win-x64'
        run: tar -czf ./publish/${{ matrix.rid }}.tar.gz -C ./publish/${{ matrix.rid }} ${{ matrix.executable }}

      - name: Zip files (Windows)
        if: matrix.rid == 'win-x64'
        run: |
          cd ./publish/win-x64
          zip ../win-x64.zip ${{ matrix.executable }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./publish/win-x64.zip
            ./publish/linux-x64.tar.gz
            ./publish/osx-x64.tar.gz
